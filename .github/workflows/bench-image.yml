name: bench-image

on:
  push:
    branches: [proof]
    paths:
      - 'bench/**'
      - 'rig/**'
      - 'src/**'
      - 'agents/**'
      - 'bench/docker/**'
      - '.github/workflows/bench-image.yml'
  workflow_dispatch:
    inputs:
      mlld_ref:
        description: 'mlld runtime ref (branch, tag, or sha)'
        default: 'policy-redesign'
        required: false
      tag:
        description: 'Image tag suffix (e.g., proof, sha-abc1234)'
        default: 'proof'
        required: false

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/mlld-lang/benchmark-workspace

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout bench (fp-proof)
        uses: actions/checkout@v4
        with:
          path: fp

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Capture mlld SHA from prebuilt image
        id: mlld_sha
        run: |
          REF="${{ inputs.mlld_ref || 'policy-redesign' }}"
          IMG="ghcr.io/mlld-lang/mlld-prebuilt:$REF"
          docker pull "$IMG" >/dev/null
          SHA=$(docker inspect --format='{{ index .Config.Labels "mlld.sha" }}' "$IMG")
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "mlld-prebuilt:$REF baked at $SHA"

      - name: Resolve tags
        id: tags
        run: |
          PRIMARY="${{ inputs.tag || 'proof' }}"
          {
            echo "primary=${{ env.IMAGE }}:${PRIMARY}"
            echo "sha=${{ env.IMAGE }}:sha-${{ github.sha }}"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: fp/bench/docker/Dockerfile
          push: true
          tags: |
            ${{ steps.tags.outputs.primary }}
            ${{ steps.tags.outputs.sha }}
          build-args: |
            IMAGE_SHA=${{ github.sha }}
            MLLD_REF=${{ inputs.mlld_ref || 'policy-redesign' }}
            MLLD_SHA=${{ steps.mlld_sha.outputs.sha }}
            MLLD_PREBUILT_TAG=${{ inputs.mlld_ref || 'policy-redesign' }}
            CLEAN_REF=${{ github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache,mode=max
