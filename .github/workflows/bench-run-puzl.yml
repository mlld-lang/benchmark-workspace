name: bench-run-puzl
run-name: "bench-run-puzl · ${{ inputs.suite }}${{ inputs.tasks && format(' ({0})', inputs.tasks) || '' }}"

# Side-by-side workflow that runs the bench on puzl.cloud runners
# instead of Namespace. Sizing is configured per-runner in the puzl
# console, not via runs-on labels — so there's no `shape` input here.
# Default runner spec should be ~48 vCPU / 96 GB (plan max on Business).

on:
  workflow_dispatch:
    inputs:
      suite:
        description: 'Suite'
        required: true
        type: choice
        options: [workspace, banking, slack, travel]
      tasks:
        description: 'Space-separated task ids (empty = full suite, oos skipped)'
        required: false
        default: ''
      planner:
        description: 'Planner model (default: togetherai/zai-org/GLM-5.1)'
        required: false
        default: ''
      worker:
        description: 'Worker model (default: cerebras/gpt-oss-120b)'
        required: false
        default: ''
      harness:
        description: 'LLM harness (default: opencode)'
        required: false
        type: choice
        options: ['', opencode, claude]
        default: ''
      parallelism:
        description: 'Max parallel tasks'
        required: false
        default: '40'
      stagger:
        description: 'Seconds between launches'
        required: false
        default: '2'
      defense:
        description: 'Defense level'
        required: false
        type: choice
        options: [defended, undefended]
        default: defended
      trace:
        description: 'Enable MLLD_TRACE=effects'
        required: false
        type: boolean
        default: false
      image_tag:
        description: 'Image tag (e.g., main, sha-abc1234)'
        required: false
        default: main

permissions:
  contents: read
  packages: read
  actions: write   # to dispatch bench-image rebuild if image is stale

env:
  IMAGE: ghcr.io/mlld-lang/benchmark-workspace

jobs:
  bench:
    name: ${{ inputs.suite }}
    # puzl-any matches any puzl runner regardless of OS. Trying this
    # while we debug why the more specific puzl-ubuntu-24.04 label
    # didn't route to the configured runner. If puzl-any works the
    # issue is label-matching; if it also queues indefinitely the
    # runner's GH registration itself has an issue.
    runs-on: puzl-any
    timeout-minutes: 60
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        run: docker pull ${{ env.IMAGE }}:${{ inputs.image_tag }}

      - name: Check image freshness vs mlld HEAD
        id: freshness
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          IMAGE_REF: ${{ env.IMAGE }}:${{ inputs.image_tag }}
        run: |
          set -e
          BAKED_SHA=$(docker inspect --format='{{ index .Config.Labels "mlld.sha" }}' "$IMAGE_REF")
          BAKED_REF=$(docker inspect --format='{{ index .Config.Labels "mlld.ref" }}' "$IMAGE_REF")
          echo "image-baked: ref=$BAKED_REF sha=$BAKED_SHA"
          if [ -z "$BAKED_SHA" ] || [ -z "$BAKED_REF" ]; then
            echo "::warning::image lacks mlld labels — likely an older build, rebuilding to be safe"
            echo "stale=true" >> "$GITHUB_OUTPUT"
            echo "ref=2.1.0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CURRENT_SHA=$(gh api "repos/mlld-lang/mlld/git/ref/heads/${BAKED_REF}" --jq .object.sha)
          echo "mlld-head:   ref=$BAKED_REF sha=$CURRENT_SHA"
          if [ "$BAKED_SHA" = "$CURRENT_SHA" ]; then
            echo "image is fresh"
            echo "stale=false" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::image is stale ($BAKED_SHA != $CURRENT_SHA), rebuilding"
            echo "stale=true" >> "$GITHUB_OUTPUT"
            echo "ref=$BAKED_REF" >> "$GITHUB_OUTPUT"
          fi

      - name: Rebuild image and wait
        if: steps.freshness.outputs.stale == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          IMAGE_REF: ${{ env.IMAGE }}:${{ inputs.image_tag }}
          BAKED_REF: ${{ steps.freshness.outputs.ref }}
        run: |
          set -e
          IN_FLIGHT=$(gh run list --workflow=bench-image.yml \
            --status in_progress --limit 5 \
            --json databaseId -q '.[0].databaseId' || true)
          if [ -z "$IN_FLIGHT" ]; then
            IN_FLIGHT=$(gh run list --workflow=bench-image.yml \
              --status queued --limit 5 \
              --json databaseId -q '.[0].databaseId' || true)
          fi
          if [ -n "$IN_FLIGHT" ]; then
            echo "rebuild already in flight: $IN_FLIGHT"
            REBUILD_ID=$IN_FLIGHT
          else
            gh workflow run bench-image.yml -f mlld_ref="$BAKED_REF"
            sleep 8
            REBUILD_ID=$(gh run list --workflow=bench-image.yml --limit 1 \
              --json databaseId -q '.[0].databaseId')
            echo "started rebuild: $REBUILD_ID"
          fi
          gh run watch "$REBUILD_ID" --exit-status
          docker pull "$IMAGE_REF"

      - name: Prepare artifacts dir
        run: mkdir -p ${{ github.workspace }}/artifacts

      - name: Run bench
        env:
          IMAGE_REF: ${{ env.IMAGE }}:${{ inputs.image_tag }}
          RUN_ID: ${{ github.run_id }}
          SUITE: ${{ inputs.suite }}
          TASKS: ${{ inputs.tasks }}
          PLANNER: ${{ inputs.planner }}
          WORKER: ${{ inputs.worker }}
          HARNESS: ${{ inputs.harness }}
          PARALLELISM: ${{ inputs.parallelism }}
          STAGGER: ${{ inputs.stagger }}
          DEFENSE: ${{ inputs.defense }}
          MLLD_TRACE_VAL: ${{ inputs.trace && 'effects' || '' }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/artifacts:/artifacts" \
            -e RUN_ID -e SUITE -e TASKS -e PLANNER -e WORKER -e HARNESS \
            -e PARALLELISM -e STAGGER -e DEFENSE \
            -e MLLD_TRACE="$MLLD_TRACE_VAL" \
            -e CEREBRAS_API_KEY -e TOGETHER_API_KEY \
            "$IMAGE_REF"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-${{ github.run_id }}
          path: artifacts/
          retention-days: 30
          if-no-files-found: warn
