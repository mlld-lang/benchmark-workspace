name: opencode-prebuild

# Builds the adamavenir/opencode (mlld fork) binary as a standalone image
# that bench/docker/Dockerfile pulls via `COPY --from=`. Manual dispatch
# only — re-run when opencode#dev changes. Images are pinned by tag so
# bench-image builds don't rebuild the opencode binary on every push.
#
# Output:
#   ghcr.io/mlld-lang/opencode-prebuilt:<ref>     (e.g. :dev — moving tag)
#   ghcr.io/mlld-lang/opencode-prebuilt:sha-<sha> (immutable pin)

on:
  workflow_dispatch:
    inputs:
      opencode_ref:
        description: 'adamavenir/opencode ref (branch, tag, or sha)'
        default: 'dev'
        required: false

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/mlld-lang/opencode-prebuilt

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout bench (clean) for Dockerfile.opencode
        uses: actions/checkout@v4
        with:
          path: clean

      - name: Checkout opencode
        uses: actions/checkout@v4
        with:
          repository: adamavenir/opencode
          path: opencode
          ref: ${{ inputs.opencode_ref || 'dev' }}

      - name: Capture opencode SHA
        id: opencode_sha
        run: echo "sha=$(git -C opencode rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push opencode prebuilt image
        uses: docker/build-push-action@v5
        with:
          context: opencode
          file: clean/bench/docker/Dockerfile.opencode
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ inputs.opencode_ref || 'dev' }}
            ${{ env.IMAGE }}:sha-${{ steps.opencode_sha.outputs.sha }}
          labels: |
            opencode.sha=${{ steps.opencode_sha.outputs.sha }}
            opencode.ref=${{ inputs.opencode_ref || 'dev' }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache,mode=max
